version: '3.8'

services:
  # ==========================================================================
  # Family Hub Application
  # ==========================================================================
  family-hub:
    build: .
    container_name: family-hub
    restart: unless-stopped
    ports:
      - "${PORT:-8001}:8001"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=${DB_NAME:-family_hub}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - photos-data:/app/backend/photos
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - family-network

  # ==========================================================================
  # MongoDB Database
  # ==========================================================================
  mongo:
    image: mongo:7
    container_name: family-hub-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - family-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  mongo-data:
  photos-data:

# ==========================================================================
# Networks
# ==========================================================================
networks:
  family-network:
    driver: bridge
